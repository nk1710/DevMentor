spring.datasource.url=jdbc:h2:mem:devmentor;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

server.port=${PORT:8080}

jwt.secret=${JWT_SECRET:change-this-local-dev-secret-at-least-32-chars}
jwt.expiration=${JWT_EXPIRATION:86400000}
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
