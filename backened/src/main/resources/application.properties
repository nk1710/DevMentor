spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/devmentor}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ✅ Performance
spring.jpa.open-in-view=false

server.port=${PORT:8080}

# ✅ Compression — faster response
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html
server.compression.min-response-size=1024

jwt.secret=${JWT_SECRET:change-this-local-dev-secret-at-least-32-chars}
jwt.expiration=${JWT_EXPIRATION:86400000}

cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
